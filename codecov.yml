coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%

component_management:
  default_rules:
    statuses:
      - type: project
  individual_components:
    - component_id: core-libraries
      name: Core Libraries
      paths:
        - lib/**
    - component_id: factory-shredder
      name: Factory & Shredder Engines
      paths:
        - bin/Invoke-ExtensionFactory.ps1
        - bin/Invoke-ExtensionShredder.ps1
        - bin/AuExtensionHooks.ps1
    - component_id: pool-orchestrator
      name: Pool Orchestrator
      paths:
        - bin/Manage-ExtensionPool.ps1
    - component_id: documentation
      name: Documentation Generator
      paths:
        - bin/Update-Documentation.ps1
