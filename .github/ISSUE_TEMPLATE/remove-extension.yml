---
name: '🗑️ Request Extension Removal'
description: 'Request a VS Code Extension to be removed from the Chocolatey repository.'
title: '[Extension Removal] '
labels: ['extension-removal']
body:
  - type: markdown
    attributes:
      value: |
        Please use this form if a tracked extension has become permanently deprecated, maliciously taken over, or otherwise needs to be removed from the repository.
  - type: input
    id: extension_id
    attributes:
      label: 'Extension ID or Package Name'
      description: 'The unique identifier of the extension (e.g., ms-python.python) or the Chocolatey package name (e.g., vscode-python).'
      placeholder: 'publisher.extension-name OR vscode-extension-name'
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: 'Reason for Removal'
      description: 'Please explain why this extension should be removed.'
      placeholder: 'e.g., The extension has been deprecated by the author, or it is no longer available on the Marketplace.'
    validations:
      required: true
