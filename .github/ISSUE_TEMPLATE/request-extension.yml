---
name: '🚀 Request New Extension'
description: 'Request a new VS Code Extension to be added to the Chocolatey repository.'
title: '[Extension Request] '
labels: ['enhancement', 'extension-request']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping expand the ecosystem! Once you submit this form, our automated Factory Bot will immediately begin scaffolding the Chocolatey templates and open a Pull Request for review.
  - type: input
    id: extension_id
    attributes:
      label: 'Extension ID'
      description: "The unique identifier of the extension (e.g., ms-python.python). You can find this on the right sidebar of the Marketplace page under 'Unique Identifier'."
      placeholder: 'publisher.extension-name'
    validations:
      required: true
