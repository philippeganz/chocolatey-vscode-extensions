---
name: Manage VS Code Extension Pool

on:
  issues:
    types: [opened, labeled, reopened]

jobs:
  scaffold-extension:
    # Only run this workflow if the issue has one of the required labels
    if: contains(github.event.issue.labels.*.name, 'extension-request') || contains(github.event.issue.labels.*.name, 'extension-removal')
    runs-on: windows-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Parse Issue and Execute Factory
        id: factory
        shell: pwsh
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          LABELS: ${{ toJSON(github.event.issue.labels.*.name) }}
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted -ErrorAction SilentlyContinue

          # The GitHub Issue Form markdown injects responses below the headers
          $issueBody = $env:ISSUE_BODY
          $labels = $env:LABELS | ConvertFrom-Json

          $extId = ""
          if ($issueBody -match '(?sm)### Extension ID\s*\n+(.*?)(?=\n###|\z)') {
              $extId = $matches[1].Trim()
          }

          if (-not $extId) {
            Write-Host "No Extension ID found in issue body." -ForegroundColor Red
            exit 1
          }

          $splat = @{}
          if ($labels -contains 'extension-removal') {
              $action = 'Remove'
              $emoji = '🗑️'
              $verb = 'Remove'
              $desc = "removed from"
              $splat["Remove"] = $extId
          } else {
              $action = 'Add'
              $emoji = '🚀'
              $verb = 'Add new'
              $desc = "added to"
              $splat["Add"] = $extId
          }

          Write-Host "Triggering Factory Engine for: $extId ($action)" -ForegroundColor Cyan
          ./bin/Manage-ExtensionPool.ps1 @splat

          # Export variables for downstream steps
          echo "EXT_ID=$extId" >> $env:GITHUB_OUTPUT
          echo "ACTION=$action" >> $env:GITHUB_OUTPUT
          echo "EMOJI=$emoji" >> $env:GITHUB_OUTPUT
          echo "VERB=$verb" >> $env:GITHUB_OUTPUT
          echo "DESC=$desc" >> $env:GITHUB_OUTPUT

      - name: Create Pull Request for Review
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: '${{ steps.factory.outputs.VERB }} ${{ steps.factory.outputs.EXT_ID }} extension'
          title: '${{ steps.factory.outputs.EMOJI }} ${{ steps.factory.outputs.ACTION }} VS Code Extension: ${{ steps.factory.outputs.EXT_ID }}'
          body: |
            Closes #${{ github.event.issue.number }}

            A community member has requested to have `${{ steps.factory.outputs.EXT_ID }}` ${{ steps.factory.outputs.DESC }} the managed Chocolatey package pool.

            This PR was 100% auto-generated by the Factory Engine. The GitHub Action has processed the request and updated the state configurations accordingly.

            ### Maintainer Instructions:
            Review the changes to ensure correctness.
            Once merged into `main`, the changes will take full effect on the next scheduled AU Engine run!
          branch: 'feature/${{ steps.factory.outputs.ACTION }}-extension-${{ github.event.issue.number }}'
          add-paths: |
            automatic/*
            var/state/config.yaml

      - name: Comment on Issue
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            🤖 Beep boop! I've caught your request!

            I just ran the Factory Engine to process this extension, and I've automatically opened a Pull Request with the generated changes here: ${{ steps.cpr.outputs.pull-request-url }}

            Once the maintainers review and merge it, your request will be fully resolved. Thanks for contributing!
