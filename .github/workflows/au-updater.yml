---
name: Chocolatey AU Updater

on:
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight
  workflow_dispatch:
    inputs:
      forced_packages:
        description: Comma separated list of packages to force update (optional)
        required: false
        type: string
      moderation_repush:
        description: Comma separated list of packages to repush to moderation without timestamping (optional)
        required: false
        type: string

jobs:
  au-update:
    runs-on: windows-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.PAT }}

      - name: Upgrade Chocolatey
        run: choco upgrade chocolatey -y --no-progress

      - name: Install Chocolatey Community Validation Extension
        run: choco install chocolatey-community-validation.extension -y --no-progress

      - name: Install Chocolatey AU Module
        shell: pwsh
        run: |
          Install-Module -Name au -Force -AcceptLicense

      - name: Install PowerShell-Yaml
        shell: pwsh
        run: |
          Install-Module -Name powershell-yaml -Force -Scope CurrentUser -AllowClobber

      - name: Run AU Updater
        shell: pwsh
        env:
          api_key: ${{ secrets.CHOCO_API_KEY }}
          github_user_repo: philippeganz/chocolatey-vscode-extensions
          github_api_key: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          $forced = "${{ inputs.forced_packages }}"
          $moderation = "${{ inputs.moderation_repush }}"

          if ($moderation) {
            ./bin/Invoke-AuUpdater.ps1 -ModerationRepush $moderation
          } elseif ($forced) {
            ./bin/Invoke-AuUpdater.ps1 -ForcedPackages $forced
          } else {
            ./bin/Invoke-AuUpdater.ps1
          }

      - name: Commit and Push Updates
        shell: pwsh
        run: |
          # Find all unique package directories that have modifications
          $status = git status --porcelain
          $modifiedPkgs = $status | ForEach-Object {
              if ($_ -match 'automatic/([^/]+)/') {
                  $Matches[1]
              }
          } | Select-Object -Unique

          if (-not $modifiedPkgs) {
              Write-Host "No changes detected. Nothing to commit."
              exit 0
          }

          foreach ($pkg in $modifiedPkgs) {
              $version = "unknown"
              $nuspecPath = "automatic/$pkg/$pkg.nuspec"
              if (Test-Path $nuspecPath) {
                  $xml = [xml](Get-Content $nuspecPath -Encoding UTF8)
                  if ($xml.package.metadata.version) {
                      $version = $xml.package.metadata.version
                  }
              }

              Write-Host "Committing updates for: $pkg (v$version)"
              git add "automatic/$pkg"
              git commit -m "🤖 Auto-Update: $pkg v$version [skip ci]"
          }

          if ($status -match 'var/state/config.yaml') {
              Write-Host "Committing newly discovered dependencies to config.yaml..."
              git add "var/state/config.yaml"
              git commit -m "🤖 Auto-Update: Register newly discovered dependencies in config.yaml [skip ci]"
          }

          Write-Host "Pushing all granular commits to main..."
          git push origin main
