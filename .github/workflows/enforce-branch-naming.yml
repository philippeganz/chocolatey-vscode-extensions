name: "Enforce Branch Naming"
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Branch Name
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          if [[ ! $BRANCH_NAME =~ ^(feature/.*|bugfix/.*)$ ]]; then
            echo "::error::Branch name '$BRANCH_NAME' violates repository rules."
            echo "::error::Branches must start with feature/ or bugfix/"
            exit 1
          fi
          echo "Branch name is perfectly compliant."
