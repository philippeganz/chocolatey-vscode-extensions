---
name: Request New VS Code Extension

on:
  issues:
    types: [opened]

jobs:
  scaffold-extension:
    # Only run this workflow if the issue has the specific request label
    if: contains(github.event.issue.labels.*.name, 'extension-request')
    runs-on: windows-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Configuration Parser (yq)
        run: choco install yq -y --no-progress

      - name: Parse Issue and Scaffold Extension
        id: factory
        shell: powershell
        run: |
          # The GitHub Issue Form markdown injects responses below the headers
          $issueBody = @"
          ${{ github.event.issue.body }}
          "@

          $extId = ""
          if ($issueBody -match '(?sm)### Extension ID\s*\n+(.*?)(?=\n###|\z)') {
              $extId = $matches[1].Trim()
          }

          if (-not $extId) {
            Write-Host "No Extension ID found in issue body." -ForegroundColor Red
            exit 1
          }

          Write-Host "Triggering Factory Scaffolding for: $extId" -ForegroundColor Cyan
          ./bin/Manage-ExtensionPool.ps1 -Add $extId

          # Export for next step
          echo "EXT_ID=$extId" >> $env:GITHUB_OUTPUT

      - name: Create Pull Request for Review
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'feat: add ${{ steps.factory.outputs.EXT_ID }} to Chocolatey pool'
          title: '🚀 Add VS Code Extension: ${{ steps.factory.outputs.EXT_ID }}'
          body: |
            Closes #${{ github.event.issue.number }}

            A community member has requested to add `${{ steps.factory.outputs.EXT_ID }}` to the managed Chocolatey package pool.

            This PR was 100% auto-generated by the Factory Engine. The GitHub Action has:
            - Validated the extension against the VS Code Marketplace API
            - Injected the extension explicitly into `etc/config.yaml`
            - Scaffolded the Chocolatey packaging templates in `automatic/`
            - Recursively resolved and scaffolded any internal `extensionDependencies`

            ### Maintainer Instructions:
            Review the extension to ensure it is not obsolete or malicious.
            Once merged into `main`, the AU Engine will natively discover it on the next chronological run, bump the version from `0.0.0` to upstream, and automatically publish it to Chocolatey!
          branch: 'feature/add-extension-${{ github.event.issue.number }}'
          add-paths: |
            automatic/*
            etc/config.yaml

      - name: Comment on Issue
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            🤖 Beep boop! I've caught your request!

            I just ran the Factory Engine to validate and scaffold this extension, and I've automatically opened a Pull Request with the generated packages here: ${{ steps.cpr.outputs.pull-request-url }}

            Once the maintainers review and merge it, it will automatically be published to the Chocolatey Community Repository on the next scheduled run. Thanks for contributing!
