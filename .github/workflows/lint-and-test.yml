---
name: Lint and Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  powershell-lint:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Update PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -AllowClobber

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          # The -EnableExit flag ensures the workflow fails if any Warnings or Errors are found
          Invoke-ScriptAnalyzer -Path . -Recurse -EnableExit

  markdown-lint:
    name: MarkdownLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install MarkdownLint
        run: npm install -g markdownlint-cli

      - name: Run MarkdownLint
        run: markdownlint "**/*.md" --ignore node_modules --ignore automatic

  yaml-lint:
    name: YamlLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: Install YamlLint
        run: pip install yamllint

      - name: Run YamlLint
        # We ignore line-length and truthy warnings that conflict with standard GitHub Action syntax
        run: |
          yamllint -d "{extends: default, rules: {line-length: disable, truthy: disable, new-lines: disable}}" .

  choco-pack-test:
    name: Chocolatey Pack Dry-Run
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get changed automatic packages
        id: changed-packages
        uses: tj-actions/changed-files@v47
        with:
          files: automatic/**
          dir_names: true
          dir_names_max_depth: 2
          separator: ','

      - name: Upgrade Chocolatey
        if: steps.changed-packages.outputs.any_changed == 'true'
        run: choco upgrade chocolatey -y

      - name: Test Package Build
        if: steps.changed-packages.outputs.any_changed == 'true'
        shell: pwsh
        run: |
          $changed = "${{ steps.changed-packages.outputs.all_changed_files }}"

          $packages = $changed -split ','
          foreach ($pkg in $packages) {
            if (Test-Path $pkg -PathType Container) {
              Write-Host ">>> Testing Pack for $pkg" -ForegroundColor Cyan
              Push-Location $pkg
              choco pack --limitoutput
              Pop-Location
            }
          }

  pester-workflow-tests:
    name: Pester Workflow Tests
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          choco upgrade chocolatey -y

      - name: Install PowerShell Modules
        shell: pwsh
        run: |
          Install-Module -Name powershell-yaml -Force -Scope CurrentUser -AllowClobber
          Install-Module -Name au -Force -Scope CurrentUser -AllowClobber -AcceptLicense
          Install-Module -Name Pester -Force -Scope CurrentUser -AllowClobber -SkipPublisherCheck

      - name: Run Pester Tests
        shell: pwsh
        run: |
          Import-Module Pester
          $config = [PesterConfiguration]::Default
          $config.Run.Path = './tests'
          $config.Run.PassThru = $true
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputFormat = 'JUnitXml'
          $config.TestResult.OutputPath = Join-Path $PWD 'test-results.xml'

          # Enable Code Coverage Profiling
          $config.CodeCoverage.Enabled = $true
          $config.CodeCoverage.Path = @('./bin/*.ps1', './lib/*.psm1')
          $config.CodeCoverage.OutputFormat = 'Cobertura'
          $config.CodeCoverage.OutputPath = Join-Path $PWD 'coverage.xml'

          $result = Invoke-Pester -Configuration $config

          # Codecov Test Analytics requires relative paths to map tests correctly
          if (Test-Path 'test-results.xml') {
              [xml]$xml = Get-Content 'test-results.xml'
              $pwdStr = $PWD.Path + [IO.Path]::DirectorySeparatorChar
              foreach ($suite in $xml.testsuites.testsuite) {
                  $suite.name = $suite.name.Replace($pwdStr, '').Replace('\', '/')
                  $suite.package = $suite.package.Replace($pwdStr, '').Replace('\', '/')
                  foreach ($case in $suite.testcase) {
                      $case.classname = $case.classname.Replace($pwdStr, '').Replace('\', '/')
                      $case.SetAttribute('file', $case.classname)
                  }
              }
              $xml.Save((Join-Path $PWD 'test-results.xml'))
          }

          if ($result.FailedCount -gt 0) {
              Write-Error "Pester tests failed!"
              exit 1
          }

      - name: Upload Test and Coverage Artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: pester-artifacts
          path: '*.xml'

  publish-reports:
    name: Publish Reports
    needs: pester-workflow-tests
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          name: pester-artifacts

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: 'test-results.xml'

      - name: Publish Code Coverage Summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          badge: true
          fail_below_min: false
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '50 75'

      - name: Write to Job Summary
        run: cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY

      - name: Upload to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false
          verbose: true

      - name: Upload test results to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: test-results.xml
          report_type: test_results
          fail_ci_if_error: false
          verbose: true

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v3
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md
