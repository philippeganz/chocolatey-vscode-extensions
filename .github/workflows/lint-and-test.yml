---
name: Lint and Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  powershell-lint:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Update PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -AllowClobber

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          # The -EnableExit flag ensures the workflow fails if any Warnings or Errors are found
          Invoke-ScriptAnalyzer -Path . -Recurse -EnableExit

  markdown-lint:
    name: MarkdownLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install MarkdownLint
        run: npm install -g markdownlint-cli

      - name: Run MarkdownLint
        run: markdownlint "**/*.md" --ignore node_modules --ignore automatic

  yaml-lint:
    name: YamlLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: Install YamlLint
        run: pip install yamllint

      - name: Run YamlLint
        # We ignore line-length and truthy warnings that conflict with standard GitHub Action syntax
        run: |
          yamllint -d "{extends: default, rules: {line-length: disable, truthy: disable, new-lines: disable}}" .

  choco-pack-test:
    name: Chocolatey Pack Dry-Run
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Upgrade Chocolatey
        run: choco upgrade chocolatey -y

      - name: Test Package Build
        shell: pwsh
        run: |
          # A quick dry-run to ensure the Factory-generated .nuspec files are completely valid
          Get-ChildItem -Path ./automatic -Directory | ForEach-Object {
            Write-Host ">>> Testing Pack for $($_.Name)" -ForegroundColor Cyan
            Push-Location $_.FullName
            choco pack --limitoutput
            Pop-Location
          }

  pester-workflow-tests:
    name: Pester Workflow Tests
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          choco upgrade chocolatey -y

      - name: Install PowerShell Modules
        shell: pwsh
        run: |
          Install-Module -Name powershell-yaml -Force -Scope CurrentUser -AllowClobber
          Install-Module -Name au -Force -Scope CurrentUser -AllowClobber -AcceptLicense
          Install-Module -Name Pester -Force -Scope CurrentUser -AllowClobber -SkipPublisherCheck

      - name: Run Pester Tests
        shell: pwsh
        run: |
          Import-Module Pester
          $config = [PesterConfiguration]::Default
          $config.Run.Path = './tests'
          $config.Run.PassThru = $true
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputFormat = 'JUnitXml'
          $config.TestResult.OutputPath = 'test-results.xml'

          # Enable Code Coverage Profiling
          $config.CodeCoverage.Enabled = $true
          $config.CodeCoverage.Path = @('./bin/*.ps1', './bin/*.psm1')
          $config.CodeCoverage.OutputFormat = 'JaCoCo'
          $config.CodeCoverage.OutputPath = 'coverage.xml'

          $result = Invoke-Pester -Configuration $config
          if ($result.FailedCount -gt 0) {
              Write-Error "Pester tests failed!"
              exit 1
          }

      - name: Publish Test Results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: 'test-results.xml'

      - name: Publish Code Coverage Summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        if: always()
        with:
          filename: coverage.xml
          badge: true
          fail_below_min: false
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '50 75'

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md

