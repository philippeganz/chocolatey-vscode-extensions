---
name: Lint and Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  detect-changes:
    name: Detect File Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changed-backend.outputs.any_changed }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Check for backend changes
        id: changed-backend
        uses: tj-actions/changed-files@v47
        with:
          files: |
            bin/**
            lib/**
            tests/**
            .github/workflows/lint-and-test.yml

  powershell-lint:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Update PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -AllowClobber

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          # The -EnableExit flag ensures the workflow fails if any Warnings or Errors are found
          Invoke-ScriptAnalyzer -Path . -Recurse -EnableExit

  markdown-lint:
    name: MarkdownLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 'lts/*'
          check-latest: true

      - name: Install MarkdownLint
        run: npm install -g markdownlint-cli

      - name: Run MarkdownLint
        run: markdownlint "**/*.md" --ignore node_modules --ignore automatic

  yaml-lint:
    name: YamlLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: Install YamlLint
        run: pip install yamllint

      - name: Run YamlLint
        # We ignore line-length and truthy warnings that conflict with standard GitHub Action syntax
        run: |
          yamllint -d "{extends: default, rules: {line-length: disable, truthy: disable, new-lines: disable}}" .

  choco-pack-test:
    name: Chocolatey Pack Dry-Run
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get changed automatic packages
        id: changed-packages
        uses: tj-actions/changed-files@v47
        with:
          files: automatic/**
          dir_names: true
          dir_names_max_depth: 2
          separator: ','

      - name: Upgrade Chocolatey
        if: steps.changed-packages.outputs.any_changed == 'true'
        run: choco upgrade chocolatey -y

      - name: Test Package Build
        if: steps.changed-packages.outputs.any_changed == 'true'
        shell: pwsh
        run: |
          $changed = "${{ steps.changed-packages.outputs.all_changed_files }}"

          $packages = $changed -split ','
          foreach ($pkg in $packages) {
            if (Test-Path $pkg -PathType Container) {
              Write-Host ">>> Testing Pack for $pkg" -ForegroundColor Cyan
              Push-Location $pkg
              choco pack --limitoutput
              Pop-Location
            }
          }

  pester-workflow-tests:
    name: Pester Workflow Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          choco upgrade chocolatey -y

      - name: Install PowerShell Modules
        shell: pwsh
        run: |
          Install-Module -Name powershell-yaml -Force -Scope CurrentUser -AllowClobber
          Install-Module -Name au -Force -Scope CurrentUser -AllowClobber -AcceptLicense
          Install-Module -Name Pester -MinimumVersion 6.0.0 -Force -Scope CurrentUser -AllowClobber -SkipPublisherCheck

      - name: Run Pester Tests
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 6.0.0 -Force
          $config = [PesterConfiguration]::Default
          $config.Run.Path = './tests'
          $config.Run.PassThru = $true
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputFormat = 'JUnitXml'
          $config.TestResult.OutputPath = Join-Path $PWD 'test-results.xml'

          # Enable Code Coverage Profiling
          $config.CodeCoverage.Enabled = $true
          $config.CodeCoverage.Path = @('./bin/*.ps1', './lib/*.psm1')
          $config.CodeCoverage.OutputFormat = 'Cobertura'
          $config.CodeCoverage.OutputPath = Join-Path $PWD 'coverage.xml'

          $result = Invoke-Pester -Configuration $config

          $pwdStr = [regex]::Escape($PWD.Path + [IO.Path]::DirectorySeparatorChar)

          # Codecov Test Analytics requires relative paths to map tests correctly
          if (Test-Path 'test-results.xml') {
              [xml]$xml = (Get-Content 'test-results.xml' -Raw) -ireplace $pwdStr, '' -replace '\\', '/'
              foreach ($suite in @($xml.testsuites.testsuite)) {
                  foreach ($case in @($suite.testcase)) {
                      $case.SetAttribute('file', $case.classname)
                      $case.classname = [System.IO.Path]::GetFileNameWithoutExtension($case.classname)
                  }
              }
              $xml.Save((Join-Path $PWD 'test-results.xml'))
          }

          # Codecov Component Mapping strictly requires POSIX relative paths in Cobertura XML
          if (Test-Path 'coverage.xml') {
              [xml]$cov = Get-Content 'coverage.xml' -Raw
              if ($cov.coverage.sources.source) {
                  $cov.coverage.sources.source = '.'
              }
              foreach ($class in $cov.SelectNodes("//class")) {
                  $class.filename = $class.filename -replace '\\', '/'
              }
              $cov.Save((Join-Path $PWD 'coverage.xml'))
          }

          if ($result.FailedCount -gt 0) {
              Write-Error "Pester tests failed!"
              exit 1
          }

      - name: Publish Coverage Reports (CodeCov)
        uses: codecov/codecov-action@v7
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false
          verbose: false

      - name: Publish Test Results (CodeCov)
        uses: codecov/codecov-action@v7
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: test-results.xml
          report_type: test_results
          fail_ci_if_error: false
          verbose: false

      - name: Publish Test Results (GitHub)
        uses: EnricoMi/publish-unit-test-result-action/windows@v2
        if: always()
        with:
          files: 'test-results.xml'
