# =============================================================================
# VS Code Extension Factory Configuration
# =============================================================================
# This file controls which extensions are automatically scaffolded, tracked,
# and updated by the CI/CD pipeline.
#
# To add a new extension, find it on the VS Code Marketplace and copy its
# "Unique Identifier" (formatted as Publisher.ExtensionName).
#
# Example: 
#   For "Prettier", the identifier is "esbenp.prettier-vscode"
# =============================================================================

config:
  # The directory where generated Chocolatey packages will be placed
  output_dir: "../automatic"

extensions:
  # Add new extensions below this line
  - esbenp.prettier-vscode
